情感和象征意义。

</p>

<h2>

创作者的话

</h2>


<p>


“以前我觉得物品只是物品，

但这次创作让我发现，

很多东西其实保存着我的经历。”

</p>







<h2>

教师观察

</h2>


<p>


象征是艺术中非常重要的语言。


艺术家并不是简单描绘事物，

而是在寻找事物背后隐藏的意义。


这件作品开始建立：

个人经验 → 视觉符号

之间的连接。

</p>
