我的内在天气

</h1>




<p class="artist">

作者：学员A

</p>






<div class="archive">





<h2>

创作练习

</h2>


<p>

内在声音练习：

<br>

尝试观察自己的情绪变化，

并将不可见的感受转化为颜色、

形态和视觉语言。

</p>







<h2>

创作者的话

</h2>


<p>

“我发现自己的内心其实像天气一样，

每天都在变化。

有时候晴朗，

有时候阴云密布，

但每一种状态都有它存在的意义。”

</p>







<h2>

教师观察

</h2>


<p>


这件作品重要的不是表现某一种情绪，

而是在创作过程中，

学习如何靠近自己的感受。


艺术在这里成为一种觉察方式：

从观察外部世界，

转向观察自己的内在世界。

</p>
